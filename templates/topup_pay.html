{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto px-6 py-20 text-center">
    <h1 class="text-4xl font-bold mb-8">Оплата USDT TRC20</h1>
    
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-12">
        <div class="mb-8">
            <p class="text-slate-400">Сумма к оплате</p>
            <p class="text-6xl font-bold text-cyan-400">{{ amount }} USDT</p>
        </div>
        
        <div class="bg-slate-800 rounded-2xl p-6 mb-8">
            <p class="text-slate-400 mb-2">Адрес кошелька:</p>
            <p id="wallet" class="font-mono break-all text-lg">{{ wallet }}</p>
        </div>

        <div class="flex gap-4 justify-center">
            <button onclick="copyToClipboard('{{ wallet }}')" 
                    class="flex-1 py-5 border border-slate-600 rounded-2xl hover:bg-slate-800 transition">
                📋 Копировать адрес
            </button>
            <button onclick="copyToClipboard('{{ amount }}')" 
                    class="flex-1 py-5 border border-slate-600 rounded-2xl hover:bg-slate-800 transition">
                📋 Копировать сумму
            </button>
        </div>
    </div>

    <p class="mt-10 text-slate-400 max-w-md mx-auto">
        После оплаты нажми кнопку «Я оплатил» в личном кабинете или напиши администратору
    </p>
</div>
{% endblock %}
