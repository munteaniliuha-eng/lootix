{% extends "base.html" %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] flex items-center justify-center px-6">
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-10 w-full max-w-md">
        <h2 class="text-3xl font-bold text-center mb-8">Вход в аккаунт</h2>
        
        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-sm mb-2 text-slate-400">Email</label>
                <input type="email" name="email" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-500">
            </div>
            <div>
                <label class="block text-sm mb-2 text-slate-400">Пароль</label>
                <input type="password" name="password" required 
                       class="w-full bg-slate-800 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-500">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-cyan-400 to-emerald-500 py-4 rounded-2xl font-semibold text-lg hover:scale-105 transition">
                Войти
            </button>
        </form>

        <div class="text-center mt-6">
            Нет аккаунта? <a href="/register" class="text-cyan-400 hover:underline">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
